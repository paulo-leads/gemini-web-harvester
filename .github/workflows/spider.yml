name: Spider Runner MVP

# Define quando a automação vai rodar
on:
  workflow_dispatch: # Permite que vocês cliquem em um botão "Run" no GitHub para testar na hora
  schedule:
    - cron: '0 0 * * *' # Agenda para rodar sozinho todo dia à meia-noite (UTC)

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dá permissão para o robô salvar o arquivo CSV no repositório

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
        
      - name: Configurar o ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar as bibliotecas (Requests e BeautifulSoup)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Ligar os motores e rodar o Crawler
        run: python crawler.py
        
      - name: Salvar (Commit) o CSV gerado de volta no GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Spider Bot"
          git add catalogo_links.csv
          # Se o crawler achar links novos, ele salva. Se não, ele ignora sem dar erro.
          git commit -m "Automated crawl: Catálogo atualizado 🕷️" || echo "Nenhum link novo para atualizar."
          git push
